aid: fixer
name: Fixer
description: >-
  Fixer is a lightweight JSON API for real-time and historical foreign exchange rates and currency conversion. Built on
  top of European Central Bank reference rates and 15+ additional data sources, Fixer supports 170+ world currencies and
  is delivered through the APILayer marketplace under a freemium subscription model.
